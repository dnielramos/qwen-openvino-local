<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Qwen 1.5B - OpenVINO</title>
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --bg-dark: #1e1f29;
            --bg-light: #2d2e3a;
            --text-light: #f8f9fa;
            --border-radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1b26, #2d2e3a);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            background: var(--bg-dark);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
        }

        .chat-header {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            padding: 15px 20px;
            text-align: center;
            position: relative;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .chat-header .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 8px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: var(--border-radius);
            margin-bottom: 8px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: linear-gradient(90deg, #4361ee, #3a0ca3);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: var(--bg-light);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .bot-message.typing::after {
            content: "▍";
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .chat-input {
            padding: 15px;
            background: var(--bg-light);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: background 0.3s;
        }

        .chat-input input:focus {
            background: rgba(255, 255, 255, 0.15);
        }

        .chat-input input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .chat-input button {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.4);
        }

        .chat-input button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        .model-info {
            text-align: center;
            padding: 8px;
            background: rgba(67, 97, 238, 0.1);
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        @media (max-width: 768px) {
            .chat-container {
                height: 90vh;
                margin: 10px;
            }
            
            .message {
                max-width: 95%;
            }
        }

        .scroll-to-bottom {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>
                <span class="status-indicator"></span>
                Qwen 1.5B - OpenVINO
            </h1>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                ¡Hola! Soy un asistente de IA potenciado por Qwen 1.5B y OpenVINO. ¿En qué puedo ayudarte hoy?
            </div>
        </div>
        
        <div class="model-info">
            Modelo: Qwen2.5-1.5B-Instruct (INT4) • Backend: OpenVINO • Streaming en tiempo real
        </div>
        
        <div class="chat-input">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Escribe tu mensaje aquí..." 
                autofocus
                onkeypress="handleKeyPress(event)"
            >
            <button onclick="sendMessage()" id="send-button">
                <span>Enviar</span>
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatMessages = document.getElementById('chat-messages');
            const userInput = document.getElementById('user-input');
            const sendButton = document.getElementById('send-button');
            const statusIndicator = document.querySelector('.status-indicator');

            // Centrar el scroll al inicio
            chatMessages.scrollTop = chatMessages.scrollHeight;

            function addMessage(text, isUser = false) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                messageDiv.innerHTML = text.replace(/\n/g, '<br>');
                chatMessages.appendChild(messageDiv);
                
                // Scroll automático al último mensaje
                setTimeout(() => {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }, 50);
                
                return messageDiv;
            }

            function handleKeyPress(event) {
                if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    sendMessage();
                }
            }

            async function sendMessage() {
                const message = userInput.value.trim();
                if (!message) return;

                // Deshabilitar input mientras se envía
                userInput.value = '';
                sendButton.disabled = true;
                sendButton.innerHTML = '<span>Enviando...</span>';

                // Mostrar mensaje del usuario
                addMessage(message, true);

                // Mostrar mensaje de "escribiendo" del bot
                const typingDiv = addMessage('');
                typingDiv.classList.add('typing');
                typingDiv.textContent = 'Escribiendo...';

                try {
                    // Hacer la petición a la API
                    const response = await fetch('http://localhost:8000/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            messages: [
                                { role: 'user', content: message }
                            ],
                            max_tokens: 2048,
                            temperature: 0.7
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Error: ${response.status}`);
                    }

                    // Remover el mensaje de "escribiendo"
                    typingDiv.remove();

                    // Crear un nuevo mensaje para la respuesta del bot
                    const botMessageDiv = addMessage('');
                    let fullResponse = '';

                    // Procesar el streaming de la respuesta
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');

                    while (true) {
                        const { done, value } = await reader.read();
                        
                        if (done) {
                            // Eliminar el cursor de escritura al finalizar
                            if (botMessageDiv.textContent.endsWith('▍')) {
                                botMessageDiv.textContent = botMessageDiv.textContent.slice(0, -1);
                            }
                            break;
                        }

                        const chunk = decoder.decode(value, { stream: true });
                        fullResponse += chunk;
                        
                        // Actualizar el mensaje con el nuevo contenido
                        botMessageDiv.textContent = fullResponse;
                        
                        // Scroll automático
                        setTimeout(() => {
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                        }, 10);
                    }

                    console.log('Respuesta completa:', fullResponse);

                } catch (error) {
                    console.error('Error:', error);
                    // Remover el mensaje de "escribiendo" si hay error
                    const typingElements = document.querySelectorAll('.typing');
                    typingElements.forEach(el => el.remove());
                    
                    addMessage(`❌ Error al conectar con el servidor: ${error.message}. Verifica que la API esté ejecutándose en http://localhost:8000`, false);
                } finally {
                    // Volver a habilitar el input
                    sendButton.disabled = false;
                    sendButton.innerHTML = '<span>Enviar</span>';
                    userInput.focus();
                }
            }

            // Actualizar el indicador de estado
            function updateStatus() {
                fetch('http://localhost:8000/docs', { method: 'HEAD' })
                    .then(() => {
                        statusIndicator.style.background = '#4ade80'; // Verde
                        statusIndicator.title = 'API conectada y funcionando';
                    })
                    .catch(() => {
                        statusIndicator.style.background = '#f87171'; // Rojo
                        statusIndicator.title = 'API desconectada - Ejecuta el servidor FastAPI';
                    });
            }

            // Verificar estado cada 5 segundos
            updateStatus();
            setInterval(updateStatus, 5000);

            // Permitir enviar con Ctrl+Enter o Cmd+Enter
            userInput.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Focus automático al cargar
            userInput.focus();

            // Añadir mensaje de bienvenida mejorado
            setTimeout(() => {
                addMessage('⚡ Este chat utiliza streaming en tiempo real con el modelo Qwen 1.5B optimizado para OpenVINO. ¡Pregunta lo que quieras!', false);
            }, 1000);
        });
    </script>
</body>
</html>
