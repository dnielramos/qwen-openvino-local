<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen 2.5 OpenVINO Interface</title>

    <!-- Tailwind CSS (CDN para prototipado rápido) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Configuración de colores personalizados (Zinc/Slate) -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#09090b', // Casi negro puro
                        surface: '#18181b',    // Gris muy oscuro
                        border: '#27272a',     // Borde sutil
                        primary: '#fafafa',    // Blanco para texto
                        secondary: '#a1a1aa',  // Gris claro para iconos/subtexto
                        accent: '#ffffff',     // Acento blanco puro
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Iconos (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Markdown Parser & Highlight.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #fafafa;
        }

        /* Scrollbar minimalista */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }

        /* Markdown Styles */
        .markdown-body p {
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .markdown-body pre {
            background: #18181b;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            border: 1px solid #27272a;
            margin: 1rem 0;
        }

        .markdown-body code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875em;
            color: #e4e4e7;
        }

        .markdown-body ul {
            list-style-type: disc;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .markdown-body ol {
            list-style-type: decimal;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        /* Animación de cursor escribiendo (Cursor Bloque) */
        .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 1.1em;
            background-color: #fafafa;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
            border-radius: 1px;
            position: relative;
            top: -1px;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body class="h-screen flex overflow-hidden antialiased text-primary bg-background">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-black border-r border-border flex flex-col hidden md:flex z-20">
        <div class="p-4 flex items-center gap-3 border-b border-border h-16">
            <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center text-black font-bold">Q</div>
            <span class="font-semibold text-lg tracking-tight">Qwen 2.5</span>
        </div>

        <div class="flex-1 overflow-y-auto p-3 space-y-2">
            <button
                class="w-full flex items-center gap-3 px-3 py-2 text-sm text-secondary hover:text-white hover:bg-surface rounded-md transition-colors group">
                <i data-lucide="plus" class="w-4 h-4"></i>
                Nuevo Chat
            </button>

            <div class="pt-4 pb-2 px-3 text-xs font-semibold text-zinc-500 uppercase tracking-wider">Historial</div>
            <!-- Historial Fake -->
            <button
                class="w-full flex items-center gap-3 px-3 py-2 text-sm text-secondary hover:text-white hover:bg-surface rounded-md transition-colors text-left truncate">
                <i data-lucide="message-square" class="w-4 h-4 opacity-50"></i>
                Análisis de código Python
            </button>
            <button
                class="w-full flex items-center gap-3 px-3 py-2 text-sm text-secondary hover:text-white hover:bg-surface rounded-md transition-colors text-left truncate">
                <i data-lucide="message-square" class="w-4 h-4 opacity-50"></i>
                Poema sobre OpenVINO
            </button>
        </div>

        <div class="p-4 border-t border-border">
            <div class="flex items-center gap-3 px-2 py-2">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-xs text-secondary">Motor: Intel GPU (Active)</span>
            </div>
            <button
                class="w-full flex items-center gap-2 mt-2 px-3 py-2 text-sm text-secondary hover:text-white transition-colors">
                <i data-lucide="settings" class="w-4 h-4"></i>
                Configuración
            </button>
        </div>
    </aside>

    <!-- MAIN CHAT AREA -->
    <main class="flex-1 flex flex-col relative bg-background">
        <!-- Header Móvil -->
        <header
            class="md:hidden h-14 border-b border-border flex items-center px-4 justify-between bg-black/50 backdrop-blur-md sticky top-0 z-10">
            <span class="font-bold">Qwen 2.5</span>
            <button class="text-secondary hover:text-white"><i data-lucide="menu" class="w-5 h-5"></i></button>
        </header>

        <!-- Messages Container -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 scroll-smooth">
            <!-- Mensaje de bienvenida -->
            <div class="flex flex-col items-center justify-center h-full text-center space-y-4 opacity-50"
                id="empty-state">
                <div class="w-12 h-12 bg-surface rounded-xl flex items-center justify-center border border-border">
                    <i data-lucide="cpu" class="w-6 h-6 text-white"></i>
                </div>
                <h2 class="text-xl font-medium text-white">¿En qué puedo ayudarte?</h2>
                <p class="text-sm text-secondary max-w-md">
                    Modelo Qwen 2.5 1.5B corriendo localmente con OpenVINO.<br>
                    Optimizado para velocidad extrema en hardware Intel.
                </p>
            </div>

            <!-- Aquí se inyectan los mensajes -->
        </div>

        <!-- Input Area -->
        <div class="p-4 md:p-6 bg-background/80 backdrop-blur-sm border-t border-border/50">
            <div class="max-w-3xl mx-auto relative">
                <form id="chat-form" class="relative group">
                    <textarea id="user-input" rows="1" placeholder="Escribe un mensaje a Qwen..."
                        class="w-full bg-surface text-white placeholder-zinc-500 border border-border rounded-xl px-4 py-4 pr-12 focus:outline-none focus:border-zinc-600 focus:ring-1 focus:ring-zinc-600 resize-none overflow-hidden transition-all shadow-lg"
                        style="min-height: 56px; max-height: 200px;"></textarea>

                    <button type="submit" id="send-btn"
                        class="absolute right-2 bottom-2 p-2 bg-white text-black rounded-lg hover:bg-zinc-200 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <i data-lucide="arrow-up" class="w-5 h-5"></i>
                    </button>
                </form>
                <div class="text-center mt-2">
                    <span class="text-[10px] text-zinc-600">AI generated content can be inaccurate.</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Inicializar Iconos
        lucide.createIcons();

        // Elementos del DOM
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatContainer = document.getElementById('chat-container');
        const emptyState = document.getElementById('empty-state');
        const sendBtn = document.getElementById('send-btn');

        // Historial de mensajes (contexto)
        let messages = [
            // { role: 'system', content: 'You are a helpful assistant.' } // Opcional
        ];

        // Ajuste automático de altura del textarea
        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.value === '') this.style.height = '56px';
        });

        // Manejar envío con Enter (sin Shift)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });

        // Función principal de envío
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // UI: Limpiar input y estado vacío
            userInput.value = '';
            userInput.style.height = '56px';
            if (emptyState) emptyState.style.display = 'none';
            sendBtn.disabled = true;

            // 1. Agregar mensaje del usuario al DOM
            addMessageToDOM('user', text);
            messages.push({ role: 'user', content: text });

            // 2. Crear burbuja del asistente (vacía al inicio)
            const assistantBubbleContent = addMessageToDOM('assistant', '');

            // 3. WebSocket Streaming para Tiempo Real sin Buffering
            try {
                const ws = new WebSocket('ws://localhost:8000/ws/chat');
                let fullResponse = "";
                let lastRenderTime = 0;

                ws.onopen = () => {
                    // Enviar petición apenas se abre el socket
                    ws.send(JSON.stringify({
                        messages: messages,
                        temperature: 0.7,
                        max_tokens: 2048
                    }));
                };

                ws.onmessage = (event) => {
                    if (event.data === "[DONE]") {
                        ws.close();
                        return;
                    }

                    if (event.data.startsWith("[ERROR:")) {
                        assistantBubbleContent.innerHTML = `<span class="text-red-500">${event.data}</span>`;
                        sendBtn.disabled = false;
                        userInput.focus();
                        ws.close();
                        return;
                    }

                    fullResponse += event.data;

                    const now = Date.now();
                    // Renderizamos a ~60 FPS (cada 16ms) para fluidez absoluta
                    if (now - lastRenderTime > 16) {
                        const rawTextWithCursor = fullResponse + '<span class="typing-cursor"></span>';
                        assistantBubbleContent.innerHTML = marked.parse(rawTextWithCursor);

                        assistantBubbleContent.querySelectorAll('pre code').forEach((block) => {
                            if (!block.dataset.highlighted) {
                                hljs.highlightElement(block);
                            }
                        });
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                        lastRenderTime = now;
                    }
                };

                ws.onclose = () => {
                    // Renderizado final cuando se cierra el stream
                    assistantBubbleContent.innerHTML = marked.parse(fullResponse);
                    assistantBubbleContent.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                    chatContainer.scrollTop = chatContainer.scrollHeight;

                    // Guardar en historial
                    messages.push({ role: 'assistant', content: fullResponse });

                    sendBtn.disabled = false;
                    userInput.focus();
                };

                ws.onerror = (error) => {
                    assistantBubbleContent.innerHTML = `<span class="text-red-500">Error de conexión WebSocket. ¿Está el servidor corriendo?</span>`;
                    sendBtn.disabled = false;
                    userInput.focus();
                };

            } catch (error) {
                assistantBubbleContent.innerHTML = `<span class="text-red-500">Error: ${error.message}</span>`;
                sendBtn.disabled = false;
                userInput.focus();
            }
        });

        // Función para crear elementos HTML de mensajes
        function addMessageToDOM(role, content) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex gap-4 max-w-3xl mx-auto w-full animate-fade-in ${role === 'user' ? 'justify-end' : ''}`;

            const isUser = role === 'user';

            // Icono
            const iconDiv = document.createElement('div');
            iconDiv.className = `w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center border ${isUser ? 'bg-zinc-800 border-zinc-700 order-2' : 'bg-white border-white order-1'
                }`;
            iconDiv.innerHTML = isUser
                ? '<i data-lucide="user" class="w-4 h-4 text-white"></i>'
                : '<i data-lucide="bot" class="w-4 h-4 text-black"></i>';

            // Burbuja de Texto
            const textDiv = document.createElement('div');
            textDiv.className = `markdown-body px-4 py-3 rounded-2xl text-sm leading-relaxed ${isUser
                ? 'bg-zinc-800 text-white rounded-tr-none'
                : 'text-zinc-100 w-full'
                }`;

            if (isUser) {
                textDiv.textContent = content;
            } else {
                // El contenido se llenará via streaming
                textDiv.innerHTML = content;
            }

            wrapper.appendChild(iconDiv);
            wrapper.appendChild(textDiv);

            chatContainer.appendChild(wrapper);
            lucide.createIcons(); // Refrescar iconos nuevos

            // Scroll al fondo
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return textDiv; // Retornamos el div de texto para actualizarlo en streaming
        }
    </script>
</body>

</html>
